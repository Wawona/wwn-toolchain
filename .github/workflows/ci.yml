name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    name: flake eval (instantiation)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: lib evaluates
        run: nix eval .#lib.baseRegistry --apply builtins.attrNames
      - name: substrate instantiates (no build)
        run: |
          nix eval --raw .#packages.aarch64-darwin.xkbcommon-ios.drvPath
          nix eval --raw .#packages.aarch64-darwin.libwayland-ios.drvPath

  build:
    name: build substrate samples
    runs-on: macos-15
    needs: eval
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix build .#packages.aarch64-darwin.xkbcommon-ios -L
